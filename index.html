<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル To Do アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #taskInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .task-item:hover {
            background: #eff1f5;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            color: #333;
            font-size: 16px;
            word-break: break-word;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .stats {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 To Do リスト</h1>

        <div class="input-section">
            <input
                type="text"
                id="taskInput"
                placeholder="新しいタスクを入力..."
                autocomplete="off"
            >
            <button id="addBtn">追加</button>
        </div>

        <ul class="task-list" id="taskList"></ul>
        <div class="empty-message" id="emptyMessage">タスクがありません</div>

        <div class="stats">
            <p>完了: <span id="completedCount">0</span> / 全体: <span id="totalCount">0</span></p>
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const emptyMessage = document.getElementById('emptyMessage');
        const completedCount = document.getElementById('completedCount');
        const totalCount = document.getElementById('totalCount');

        const STORAGE_KEY = 'todoTasks';

        // ローカルストレージからタスクを取得
        function getTasks() {
            const tasks = localStorage.getItem(STORAGE_KEY);
            return tasks ? JSON.parse(tasks) : [];
        }

        // タスクをローカルストレージに保存
        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        // タスクを追加
        function addTask(text) {
            if (text.trim() === '') {
                alert('タスクを入力してください');
                return;
            }

            const tasks = getTasks();
            const newTask = {
                id: Date.now(),
                text: text.trim(),
                completed: false
            };

            tasks.push(newTask);
            saveTasks(tasks);
            taskInput.value = '';
            renderTasks();
            taskInput.focus();
        }

        // タスク完了をトグル
        function toggleComplete(id) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks(tasks);
                renderTasks();
            }
        }

        // タスクを削除
        function deleteTask(id) {
            const tasks = getTasks();
            const filteredTasks = tasks.filter(t => t.id !== id);
            saveTasks(filteredTasks);
            renderTasks();
        }

        // タスク一覧をレンダリング
        function renderTasks() {
            const tasks = getTasks();
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                emptyMessage.style.display = 'block';
                completedCount.textContent = '0';
                totalCount.textContent = '0';
                return;
            }

            emptyMessage.style.display = 'none';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;

                li.innerHTML = `
                    <input
                        type="checkbox"
                        class="checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleComplete(${task.id})"
                    >
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">削除</button>
                `;

                taskList.appendChild(li);
            });

            // 統計情報を更新
            const completed = tasks.filter(t => t.completed).length;
            completedCount.textContent = completed;
            totalCount.textContent = tasks.length;
        }

        // HTMLエスケープ（セキュリティ対策）
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // イベントリスナー
        addBtn.addEventListener('click', () => {
            addTask(taskInput.value);
        });

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask(taskInput.value);
            }
        });

        // 初期表示
        renderTasks();
        taskInput.focus();
    </script>
</body>
</html>
